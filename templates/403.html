<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>需要登录 - 交易系统</title>
    <link rel="stylesheet" href="/static/styles.css">
    <style>
        .error-container {
            max-width: 600px;
            margin: 100px auto;
            padding: 40px;
            text-align: center;
        }

        .error-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .error-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 16px;
            color: var(--text);
        }

        .error-message {
            font-size: 16px;
            color: var(--text-secondary);
            margin-bottom: 32px;
            line-height: 1.6;
        }

        .error-actions {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .permission-info {
            background: var(--surface-hover);
            padding: 20px;
            border-radius: var(--radius-lg);
            margin-top: 32px;
            text-align: left;
            border: 1px solid var(--surface-border);
        }

        .permission-info h3 {
            margin: 0 0 12px 0;
            font-size: 16px;
            color: var(--accent);
        }

        .permission-info ul {
            margin: 0;
            padding-left: 20px;
            color: var(--text-secondary);
        }

        .permission-info li {
            margin-bottom: 8px;
        }

        /* 登录表单样式 */
        .login-section {
            margin-top: 32px;
            padding-top: 32px;
            border-top: 1px solid var(--surface-border);
        }

        .login-form-container {
            max-width: 420px;
            margin: 0 auto;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .login-input {
            width: 100%;
            padding: 12px 16px;
            border-radius: var(--radius-md);
            border: 1px solid var(--surface-border-light);
            background: var(--surface-hover);
            color: var(--text);
            font-size: 14px;
            box-sizing: border-box;
        }

        .login-input:focus {
            outline: none;
            border-color: var(--blue);
            box-shadow: 0 0 0 3px var(--blue-soft);
        }

        .login-button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: var(--radius-md);
            background: var(--accent);
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .login-button:hover:not(:disabled) {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        .login-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .error-text {
            background: var(--red-soft);
            color: var(--red);
            padding: 10px 14px;
            border-radius: var(--radius-md);
            margin-bottom: 16px;
            display: none;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-icon">🔒</div>
        <h1 class="error-title">需要登录</h1>
        <p class="error-message">
            您需要登录才能访问此功能。
        </p>

        <div class="login-section">
            <h3 style="text-align: center; margin-bottom: 20px;">用户登录</h3>
            <div class="login-form-container">
                <div id="loginError" class="error-text"></div>
                <form id="loginForm" class="login-form">
                    <input
                        type="text"
                        id="username"
                        name="username"
                        placeholder="用户名"
                        class="login-input"
                        required
                        autocomplete="username"
                    >
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="密码"
                        class="login-input"
                        required
                        autocomplete="current-password"
                    >
                    <div style="display: flex; gap: 8px; align-items: center;">
                        <input type="checkbox" id="rememberMe" name="rememberMe" style="width: auto;">
                        <label for="rememberMe" style="font-size: 13px; color: var(--text-secondary); cursor: pointer;">记住登录状态</label>
                    </div>
                    <button type="submit" class="login-button">登录</button>
                </form>
            </div>
        </div>

        <div class="error-actions">
            <button onclick="window.location.href='/'">返回首页</button>
        </div>

        <div class="permission-info">
            <h3>📋 功能权限说明</h3>
            <ul>
                <li><strong>查看功能</strong>：所有登录用户都可以查看策略、持仓和交易记录</li>
                <li><strong>手动下单</strong>：仅管理员可访问</li>
                <li><strong>创建策略</strong>：仅管理员可访问</li>
                <li><strong>用户管理</strong>：仅管理员可访问</li>
            </ul>
        </div>
    </div>

    <script>
        // 检查用户是否已登录
        async function checkLoginStatus() {
            const token = localStorage.getItem('auth_token') || sessionStorage.getItem('auth_token');
            if (!token) {
                // 未登录，显示登录表单
                return;
            }

            try {
                const response = await fetch('/api/auth/me', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (response.ok) {
                    // 已登录，检查是否有权限
                    const user = await response.json();

                    // 如果是管理员，显示可以继续访问的提示，而不是自动跳转
                    if (user.role === 'admin') {
                        document.querySelector('.error-title').textContent = '请重新登录';
                        document.querySelector('.error-message').textContent =
                            '检测到您是管理员，但登录可能已过期。请重新登录以继续。';
                        document.querySelector('.login-section').style.display = 'block';
                    } else {
                        // 普通用户，显示权限说明
                        document.querySelector('.error-title').textContent = '权限不足';
                        document.querySelector('.error-message').textContent =
                            '此功能仅限管理员使用。您当前的账号类型：普通用户';
                        document.querySelector('.login-section').style.display = 'none';
                    }
                }
            } catch (error) {
                console.error('检查登录状态失败:', error);
            }
        }

        // 页面加载时检查
        checkLoginStatus();

        // 登录表单处理
        document.getElementById('loginForm').addEventListener('submit', async (event) => {
            event.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;

            const submitButton = document.querySelector('.login-button');
            submitButton.disabled = true;
            submitButton.textContent = '登录中...';

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username,
                        password,
                        remember_me: rememberMe
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || '登录失败');
                }

                // 存储 token
                const storage = rememberMe ? localStorage : sessionStorage;
                storage.setItem('auth_token', data.access_token);
                storage.setItem('user_info', JSON.stringify(data.user));

                // 跳转到当前页面以重新加载（会使用新的认证信息）
                window.location.reload();

            } catch (error) {
                document.getElementById('loginError').textContent = error.message;
                document.getElementById('loginError').style.display = 'block';
                submitButton.disabled = false;
                submitButton.textContent = '登录';
            }
        });
    </script>
</body>
</html>
